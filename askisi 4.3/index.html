<!DOCTYPE html>

<html>
	<head>
	
		<meta charset="utf-8">
		<title>Exercise 4.3.1</title>
		<link rel="stylesheet" href="css/bootstrap.min.css">
		<link rel="stylesheet" href="css/style.css">
		<script src="js/jquery-3.6.0.min.js"></script>
		<script src="js/bootstrap.min.js"></script>
		
	</head>
	
	<body>
		<div class="container">
			<div class="row justify-content-md-center">
				<div class="col-md-auto">
				<form>
					<h1>Αριθμομηχανή</h1>
						<div class="form-group">
							<label for="quantity">Αριθμός 1:</label>
							<input type="number" id="quantity">			
						</div>
						<div class="form-group">
							<label for="quantity2">Αριθμός 2:</label>
							<input type="number" id="quantity2">			
						</div>						
						<div class="btn-group" role="group" aria-label="Basic example">
							<button type="button"  onclick="prosthesi()" class="btn btn-secondary">+</button>
							<button type="button"  onclick="afairesi()" class="btn btn-secondary">-</button>
							<button type="button"  onclick="polapl()" class="btn btn-secondary">*</button>
							<button type="button"  onclick="divide()" class="btn btn-secondary">/</button>
							<input class="form-control" id="calc" type="text" value="Αποτέλεσμα" aria-label="Disabled input example" readonly>
						</div>							
				</form>
				</div>
			</div>
		</div>
		
		<script>
				
		function prosthesi(){
			var arithm1=Number(document.getElementById("quantity").value);
			var arithm2=Number(document.getElementById("quantity2").value);
			var sum= arithm1+arithm2;
			document.getElementById("calc").value=sum;
			}
					
		function afairesi(){
			var arithm1=Number(document.getElementById("quantity").value);
			var arithm2=Number(document.getElementById("quantity2").value);
			var dif= arithm1-arithm2;
			document.getElementById("calc").value=dif;
			}
			
		function polapl(){
			var arithm1=Number(document.getElementById("quantity").value);
			var arithm2=Number(document.getElementById("quantity2").value);
			var multipl= arithm1*arithm2; 
			document.getElementById("calc").value=multipl;
			}
		
		function divide(){
			var arithm1=Number(document.getElementById("quantity").value);
			var arithm2=Number(document.getElementById("quantity2").value);
			var diairesi= arithm1/arithm2;
			document.getElementById("calc").value=diairesi;
			}
			
		</script>
		
	</body>

</html>
